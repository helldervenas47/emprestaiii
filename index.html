<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>EmprestAI</title>
    <meta name="description" content="EmprestAI - Controle de empréstimos">
    <link rel="icon" href="/favicon.png" type="image/png" />

    <!-- Perf: parallelize third-party origins.
         Preconnect ao host Supabase externo (real) evita pagar DNS+TLS na primeira
         chamada de auth/API, encurtando o TTFB do primeiro request em ~100-300ms. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://syyxnqzxqabeuqbuptkh.supabase.co" />
    <link rel="preconnect" href="https://syyxnqzxqabeuqbuptkh.supabase.co" crossorigin />

    <!-- Non-blocking font load: paints with system fallback, swaps to Space Grotesk / DM Sans once ready -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
      onload="this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
      />
    </noscript>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- theme-color must match the app background exactly to avoid visible bands
         on Android status/nav bar. Values equal --background from index.css. -->
    <meta name="theme-color" content="#f7f7fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#171c26" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#171c26" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EmprestAI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="EmprestAI" />
    <meta name="msapplication-TileColor" content="#0F172A" />
    <meta name="screen-orientation" content="portrait" />
    <meta name="full-screen" content="yes" />
    <meta name="browsermode" content="application" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="x5-page-mode" content="app" />
    <meta name="x5-orientation" content="portrait" />
    <meta name="author" content="EmprestAI" />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/SdHb9T7U4RTOJWiyTggRQcq0HDC3/social-images/social-1775806003030-WhatsApp_Image_2026-04-10_at_03.28.21.webp">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@EmprestAI" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/SdHb9T7U4RTOJWiyTggRQcq0HDC3/social-images/social-1775806003030-WhatsApp_Image_2026-04-10_at_03.28.21.webp">
    <meta property="og:title" content="EmprestAI">
    <meta name="twitter:title" content="EmprestAI">
    <meta property="og:description" content="EmprestAI - Controle de empréstimos">
    <meta name="twitter:description" content="EmprestAI - Controle de empréstimos">
  </head>

  <body>
    <div id="root"></div>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
