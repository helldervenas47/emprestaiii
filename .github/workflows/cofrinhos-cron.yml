name: Cofrinhos Cron

on:
  schedule:
    - cron: "5 3 * * *"
    - cron: "10 3 * * *"
  workflow_dispatch:

jobs:
  sync-taxas:
    if: github.event.schedule == '5 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Sync taxas financeiras
        run: |
          curl -X POST "$SUPABASE_URL/functions/v1/sync-taxas-financeiras" \
          -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
          -H "Content-Type: application/json" \
          -d '{}'

  calcular-rendimento:
    if: github.event.schedule == '10 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Calcular rendimento cofrinhos
        run: |
          curl -X POST "$SUPABASE_URL/functions/v1/calcular-rendimento-cofrinhos" \
          -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
          -H "Content-Type: application/json" \
          -d '{}'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
